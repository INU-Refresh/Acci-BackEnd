services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_REPO}
    container_name: acci
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Seoul -Xms256m -Xmx512m
      - MYSQL_URL=${MYSQL_URL}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - AI_SERVER_URL=${AI_SERVER_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AI_MAX_ATTEMPTS=${AI_MAX_ATTEMPTS}
      - AI_INTERVAL_MS=${AI_INTERVAL_MS}
      - VECTOR_DB_URL=${VECTOR_DB_URL}
      - VECTOR_DB_USERNAME=${VECTOR_DB_USERNAME}
      - VECTOR_DB_PASSWORD=${VECTOR_DB_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - monitoring
    volumes:
      - /opt/acci/docs:/opt/acci/docs:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: acci-pgvector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=acci_vector
      - POSTGRES_USER=${VECTOR_DB_USERNAME}
      - POSTGRES_PASSWORD=${VECTOR_DB_PASSWORD}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    networks:
      - monitoring

  # 부하 테스트 전용 (load-test 프로파일)
  # Resilience4j 적용 전후 비교를 위한 측정 환경
  # 데이터 흐름: k6 → app → toxiproxy → wiremock

  # AI 서버 장애 주입 프록시
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: acci-toxiproxy
    restart: unless-stopped
    profiles: ["load-test"]
    ports:
      - "8474:8474"  # Toxiproxy 관리 API (프록시/toxic 설정용)
      - "8666:8666"  # AI 서버 프록시 listen 포트 (앱은 이 포트로 호출)
    networks:
      - monitoring

  # AI 서버를 흉내내는 가짜 서버 (재현 가능한 응답 보장)
  # 실제 AI 분석 시간 변동을 제거하여 baseline/after 노이즈 최소화 목적.
  # mappings/ 의 stub JSON 으로 응답 정의.
  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: acci-wiremock
    restart: unless-stopped
    profiles: ["load-test"]
    ports:
      - "8089:8080"  # 호스트 디버깅용 (앱은 toxiproxy 경유로 호출하므로 직접 노출 불필요)
    volumes:
      - ./load-test/wiremock/mappings:/home/wiremock/mappings:ro
      - ./load-test/wiremock/__files:/home/wiremock/__files:ro
    command:
      - "--global-response-templating"  # 동적 응답 (path param, UUID 생성 등)
      - "--disable-banner"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  pgvector-data: