spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
        type: false
        jdbc:
          time_zone: Asia/Seoul
          lob:
            non_contextual_creation: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  security:
    oauth2:
      client:
        registration:
          # Google OAuth2
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "${BACKEND_URL}/api/v1/auth/oauth2/callback/{registrationId}"

          # Kakao OAuth2
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${BACKEND_URL}/api/v1/auth/oauth2/callback/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao

          # Naver OAuth2
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${BACKEND_URL}/api/v1/auth/oauth2/callback/{registrationId}"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# JWT 설정
jwt:
  key: ${JWT_SECRET_KEY}
  access-token-validity-in-seconds: 15552000  #6개월
  refresh-token-validity-in-seconds: 31104000 #1년

# OpenAI 설정
openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com/v1
  model: gpt-5-nano
  max-tokens: 10000
  temperature: 0.3

# RAG 용 Gemini 설정
gemini:
  api-key: ${GEMINI_API_KEY}

# 애플리케이션 설정
app:
  oauth2:
    allowed-origins:
      - https://acci-ai.site
      - https://www.acci-ai.site
      - https://local.acci-ai.site:3001
    default-origin: https://acci-ai.site
  cookie:
    secure: true
    domain: .acci-ai.site
    access-token-same-site: Lax
    refresh-token-same-site: Lax

server:
  port: 8080

ai:
  server:
    url: ${AI_SERVER_URL}
  max-attempts: ${AI_MAX_ATTEMPTS}
  interval-ms: ${AI_INTERVAL_MS}

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}

vector-db:
  url: ${VECTOR_DB_URL}
  username: ${VECTOR_DB_USERNAME}
  password: ${VECTOR_DB_PASSWORD}
  driver-class-name: org.postgresql.Driver
  hikari:
    connection-init-sql: "SET client_encoding TO 'UTF8'"

logging:
  file:
    path: /acci/logs

# Actuator / Prometheus 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: acci

resilience4j:
  circuitbreaker:
    instances:
      aiClient:
        # 슬라이딩 윈도우: 최근 10회 호출 기준으로 실패율 계산
        slidingWindowSize: 10
        # 서킷 열기 판정에 필요한 최소 호출 수 (5회 미만이면 CLOSED 유지)
        minimumNumberOfCalls: 5
        # HALF_OPEN 상태에서 허용하는 테스트 호출 수
        permittedNumberOfCallsInHalfOpenState: 3
        # 실패율 50% 이상이면 OPEN (빠른 실패로 전환)
        failureRateThreshold: 50
        # 느린 호출 비율 80% 이상이면 OPEN
        slowCallRateThreshold: 80
        # 3초 이상 걸리는 호출을 "느린 호출"로 간주
        slowCallDurationThreshold: 3s
        # OPEN 상태 유지 시간 — 이후 HALF_OPEN으로 전환
        waitDurationInOpenState: 10s
        # /actuator/health 에 CB 상태 노출
        registerHealthIndicator: true
        # Bulkhead 거절은 AI 서버 문제가 아니므로 서킷 실패 카운트에서 제외
        ignoreExceptions:
          - io.github.resilience4j.bulkhead.BulkheadFullException

  retry:
    instances:
      aiClient:
        # 원본 1회 + 재시도 2회 = 최대 3회 시도
        maxAttempts: 3
        # 지수 백오프: 500ms → 1000ms (jitter ±50%)
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        randomizedWaitFactor: 0.5
        # 서킷 OPEN / Bulkhead 포화 예외는 재시도 없이 즉시 전파
        ignoreExceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - io.github.resilience4j.bulkhead.BulkheadFullException

  bulkhead:
    instances:
      aiClient:
        # AI 서버 동시 호출 상한 — 초과 시 BulkheadFullException
        maxConcurrentCalls: 10
        # 대기 없이 즉시 거절 (timeout=0)
        maxWaitDuration: 0ms